# docker-compose.yml
services:
  db:
    image: pgvector/pgvector:pg17-bookworm
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    container_name: postgres_personal_email
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./src/schemas/schema.sql:/docker-entrypoint-initdb.d/schema.sql
volumes:
  pgdata: